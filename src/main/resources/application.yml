# Perfil por defecto: H2 en memoria — arranca sin dependencias externas,
# pensado para la práctica de la formación (mvn spring-boot:run).
spring:
  application:
    name: ecommerce-demo
  datasource:
    url: jdbc:h2:mem:ecommerce_demo;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

